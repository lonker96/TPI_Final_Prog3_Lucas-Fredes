<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - FoodStore</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/assets/css/orders.css">
</head>
<body>
    <header>
        <h1 class="logo">FoodStore</h1>
        <div class="header-nav">
            <a href="/src/pages/store/home.html" id="link-catalogo">Catálogo</a>
            <button id="logoutButton" class="btn-logout">Cerrar Sesión</button>
        </div>
    </header>

    <main class="contenedor-pedidos">
        <h2>Mis Pedidos</h2>
        <p class="subtitulo">Seguí el estado de tus compras en tiempo real.</p>

        <section id="lista-pedidos" class="tabla-contenedor">
            <p class="cargando">Cargando tus pedidos...</p>
        </section>
    </main>

    <div id="modal-detalle-pedido" class="modal-overlay hidden">
        <div class="modal-contenido">
            <div class="modal-header">
                <h3>Detalle del Pedido <span id="modal-id-pedido"></span></h3>
                <button id="btn-cerrar-modal" class="btn-cerrar">&times;</button>
            </div>
            <div class="modal-body" id="modal-body-content">
                </div>
        </div>
    </div>

    <script type="module" src="./orders.js"></script>
</body>
</html>
