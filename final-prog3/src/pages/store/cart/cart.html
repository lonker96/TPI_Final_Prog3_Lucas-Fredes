<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/assets/css/cart.css">
</head>
<body>
    <header>
        <h1 class="logo">FoodStore</h1>
        <div class="header-nav">
        <a href="/src/pages/store/cart/cart.html" id="link-carrito">Carrito
            <span id="carrito-count" class="badge">0</span>
        </a>
        <a href="/src/pages/store/home.html" id="link-catalogo">Catalogo</a>
        </div>
    </header>

    
    <div>
        <h2>Tu Pedido</h2>
        <div class="carrito-layaout">
            <section id="items-carrito" class="lista-items"></section>
            
            <aside id="resumen-container" class="resumen-carrito">
                <h3>Resumen</h3>
                <div class="resumen-detalles">
                    <div class="fila">
                        <span>Subtotal</span>
                        <span data-resumen="subtotal">$0</span>
                    </div>
                    <div class="fila">
                        <span>Envío</span>
                        <span id="costo-envio">$500</span> 
                    </div>
                    <div class="fila-total">
                        <span>Total</span>
                        <span data-resumen="total" class="total-numero">$0</span>
                    </div>
                </div>

                <form id="form-checkout" class="form-checkout">
                    <h4>Datos de Entrega</h4>
                    <div class="campo">
                        <label for="checkout-direccion">Dirección de Entrega *</label>
                        <input type="text" id="checkout-direccion" placeholder="Ej: Av. Siempreviva 742" required>
                    </div>
                    <div class="campo">
                        <label for="checkout-telefono">Teléfono de Contacto *</label>
                        <input type="tel" id="checkout-telefono" placeholder="Ej: 1123456789" required>
                    </div>
                    <div class="campo">
                        <label for="checkout-pago">Método de Pago *</label>
                        <select id="checkout-pago" required>
                            <option value="" disabled selected>Seleccione una opción</option>
                            <option value="EFECTIVO">Efectivo (Contra entrega)</option>
                            <option value="TRANSFERENCIA">Transferencia / Mercado Pago</option>
                        </select>
                    </div>
                </form>

                <div class="resumen-acciones">
                    <button data-action="finalizar" class="btn-primario">Finalizar compra</button>
                    <button data-action="vaciar" class="btn-secundario">Vaciar carrito</button>
                </div>
            </aside>
        </div>
    </div>
    <script type="module" src="./cart.ts"></script>
</body>
</html>
